{{- $opts := dict -}}
{{- if not (transform.CanHighlight .Type) -}}
  {{- $opts = dict "type" "text" -}}
{{- end -}}
{{- with .Options -}}
  {{- $opts = merge $opts . -}}
{{- end -}}
{{- $result := transform.HighlightCodeBlock . $opts -}}
<div class="post-code" data-lang="{{ .Type | default "text" }}">
  <div class="post-code__chrome">
    <div class="post-code__traffic" aria-hidden="true">
      <span class="post-code__dot post-code__dot--close"></span>
      <span class="post-code__dot post-code__dot--min"></span>
      <span class="post-code__dot post-code__dot--max"></span>
    </div>
    <button type="button" class="post-code__copy" aria-label="复制代码">
      <svg class="post-code__copy-icon" viewBox="0 0 24 24" width="14" height="14" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="9" width="11" height="11" rx="1.5"/>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
      </svg>
      <svg class="post-code__copy-done" viewBox="0 0 24 24" width="14" height="14" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 13l4 4L19 7"/>
      </svg>
    </button>
  </div>
  <div class="post-code__body">
    {{ $result.Wrapped }}
  </div>
  <button type="button" class="post-code__toggle" hidden aria-expanded="false" aria-label="展开代码">
    <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M7 10l5 5 5-5"/>
      <path d="M7 14l5 5 5-5"/>
    </svg>
  </button>
</div>
