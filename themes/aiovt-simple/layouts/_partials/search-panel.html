{{- $cfg := site.Params.search | default dict -}}
{{- if ($cfg.enabled | default true) -}}
<div
  class="site-search"
  id="site-search"
  data-search
  hidden
  data-index-url="{{ "index.json" | relURL }}"
  data-placeholder="{{ $cfg.placeholder | default "搜索文章、动态…" }}"
  data-empty="{{ $cfg.empty | default "没有找到相关内容" }}"
  data-section-labels="{{ ($cfg.section_labels | default (dict "posts" "文章" "thoughts" "动态")) | jsonify }}"
>
  <div class="site-search__backdrop" data-search-close tabindex="-1" aria-hidden="true"></div>
  <div
    class="site-search__panel"
    role="dialog"
    aria-modal="true"
    aria-labelledby="site-search-title"
  >
    <h2 class="visually-hidden" id="site-search-title">站内搜索</h2>
    <div class="site-search__head">
      <label class="site-search__field">
        <svg class="site-search__icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <circle cx="11" cy="11" r="6.5"/>
          <path d="M16 16l4.5 4.5"/>
        </svg>
        <input
          class="site-search__input"
          type="search"
          name="q"
          autocomplete="off"
          autocapitalize="off"
          spellcheck="false"
          placeholder="{{ $cfg.placeholder | default "搜索文章、动态…" }}"
          data-search-input
        >
      </label>
      <button type="button" class="site-search__close" data-search-close aria-label="关闭搜索">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <path d="M6 6l12 12M18 6L6 18"/>
        </svg>
      </button>
    </div>
    <p class="site-search__hint">{{ $cfg.hint | default "输入关键词搜索，按 Esc 关闭" }}</p>
    <ul class="site-search__results" data-search-results role="listbox" aria-label="搜索结果"></ul>
    <p class="site-search__empty" data-search-empty hidden>{{ $cfg.empty | default "没有找到相关内容" }}</p>
  </div>
</div>
{{- end -}}
