{{- $hitokoto := site.Params.hitokoto -}}
{{- if $hitokoto.enabled }}
<div
  class="hero__bio hero__hitokoto hero-animate"
  id="hitokoto"
  style="--delay: 0.5s"
  data-hitokoto
  data-fallback="{{ $hitokoto.fallback }}"
  data-interval="{{ $hitokoto.interval | default 30 }}"
  data-seen-max="{{ $hitokoto.seen_max | default 100 }}"
  {{- with $hitokoto.type }} data-type="{{ . }}"{{ end }}
  {{- if $hitokoto.show_from }} data-show-from="true"{{ end }}
  title="点击换一句，每 {{ $hitokoto.interval | default 30 }} 秒自动切换"
  role="button"
  tabindex="0"
  aria-label="一言，点击换一句"
>
  <p class="hero__hitokoto-text is-loading" data-hitokoto-text>加载中…</p>
  <cite class="hero__hitokoto-from" data-hitokoto-from hidden></cite>
</div>
{{- end }}
