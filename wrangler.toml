# Cloudflare Pages 配置
# 文档：https://developers.cloudflare.com/pages/framework-guides/deploy-a-hugo-site/
#
# 在 Cloudflare 控制台 → Pages → Settings → Environment variables 中添加：
#   HUGO_VERSION = 0.163.3
#   HUGO_ENV     = production
# （Preview / Production 环境均需设置）

name = "asimple"
compatibility_date = "2026-06-28"
pages_build_output_dir = "./public"

[build]
command = "curl -L -f -o hugo.tar.gz https://github.com/gohugoio/hugo/releases/download/v0.160.1/hugo_extended_0.160.1_linux-amd64.tar.gz && tar -xzf hugo.tar.gz && chmod +x hugo && ./hugo --minify"